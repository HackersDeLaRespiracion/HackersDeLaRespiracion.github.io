<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pagina con Fondo</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .fondo {
            /* Ruta de la imagen de fondo */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
		url("Images/fondo.png");

            /* Hacer que la imagen cubra toda la pantalla */
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed; /* Mantiene la imagen fija al hacer scroll */
        }

        .contenido {
            text-align: center;
            color: white;
            padding-top: 20%; /* Ajusta esto para mover el texto hacia abajo */
        }
a:link, a:visited { color: gold; text-decoration: underline; /* Puedes poner 'none' si no quieres subrayado */
        }
 a:hover {
            color: yellow; /* Un pequeño brillo al pasar el ratón */
        }
    </style>
</head>
<body>
    <div class="fondo">
        <div class="contenido">
           <h1>SISTEMA OPERATIVO: ¡No es yoga! 1.0</h1>
   		<p>> Iniciando protocolo de inhalación...</p>
 		<p>> Optimizando sistema nervioso...</p>

    		<p> O en inglés en <a href="https://amzn.to/4sUPJ8Z">https://amzn.to/4sUPJ8Z</a> <o:p></o:p></p>
    		<p>Próximamente: La comunidad definitiva de Biohacking.</p>
        </div>
    </div>
</body>
</html>
